<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星序 · 飞书授权</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --brand: #4f6ef7;
      --brand-light: #eef1ff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --success: #10b981;
      --error: #ef4444;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon {
      width: 64px;
      height: 64px;
      background: var(--brand-light);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .code-card {
      background: var(--brand-light);
      border: 1.5px dashed var(--brand);
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .code-card:hover {
      border-style: solid;
      box-shadow: 0 0 0 4px rgba(79,110,247,0.08);
    }
    .code-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .code-value {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 18px;
      color: var(--text);
      font-weight: 600;
      line-height: 1.5;
      word-break: break-all;
      letter-spacing: 0.5px;
    }
    .btn {
      width: 100%;
      background: var(--brand);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      background: #3d5ce5;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(79,110,247,0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn.copied {
      background: var(--success);
    }
    .toast {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.3s ease;
      height: 20px;
    }
    .toast.show { opacity: 1; }
    .steps {
      margin-top: 28px;
      text-align: left;
      background: #f9fafb;
      border-radius: 16px;
      padding: 20px 24px;
    }
    .steps-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--brand);
      color: white;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .error-card {
      padding: 40px 20px;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--error);
      margin-bottom: 8px;
    }
    .error-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card" id="main-card">
    <div id="loading-view">
      <div class="icon">✨</div>
      <h1>星序 StarOrder</h1>
      <p class="subtitle">正在获取授权码…</p>
      <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;"></div>
    </div>

    <div id="success-view" class="hidden">
      <div class="icon">🔐</div>
      <h1>授权成功</h1>
      <p class="subtitle">飞书日历已授权，请复制下方授权码</p>

      <div class="code-card">
        <div class="code-label">Authorization Code</div>
        <div class="code-value" id="code-display">---</div>
      </div>

      <button class="btn" id="copy-btn" onclick="copyCode()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        复制授权码
      </button>
      <div class="toast" id="toast">✅ 已复制，请回到星序应用粘贴</div>

      <div class="steps">
        <div class="steps-title">下一步</div>
        <div class="step">
          <span class="step-num">1</span>
          <span>点击上方按钮复制授权码</span>
        </div>
        <div class="step">
          <span class="step-num">2</span>
          <span>返回「星序」应用</span>
        </div>
        <div class="step">
          <span class="step-num">3</span>
          <span>粘贴到输入框，点击提交</span>
        </div>
      </div>
    </div>

    <div id="error-view" class="hidden error-card">
      <div class="error-icon">😕</div>
      <div class="error-title">未获取到授权码</div>
      <div class="error-desc">
        授权流程未完成，或用户取消了授权。<br>
        请返回星序应用重新尝试。
      </div>
    </div>
  </div>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }
    function $(id) { return document.getElementById(id); }

    async function autoCopy(text) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          showToast('✅ 已自动复制，请回到星序应用粘贴');
        }
      } catch (e) {}
    }

    function showToast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function copyCode() {
      const code = $('code-display').textContent;
      const btn = $('copy-btn');

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(() => {
          btn.classList.add('copied');
          btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> 已复制';
          showToast('✅ 已复制，请回到星序应用粘贴');
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 复制授权码';
          }, 2500);
        }).catch(() => fallbackCopy(code));
      } else {
        fallbackCopy(code);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showToast('✅ 已复制');
      } catch (e) {
        showToast('❌ 复制失败，请手动选中复制');
      }
      document.body.removeChild(ta);
    }

    window.onload = function() {
      const code = getParam('code');
      if (code && code.length > 5) {
        $('loading-view').classList.add('hidden');
        $('success-view').classList.remove('hidden');
        $('code-display').textContent = code;
        setTimeout(() => autoCopy(code), 600);
      } else {
        $('loading-view').classList.add('hidden');
        $('error-view').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
